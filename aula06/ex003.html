<!DOCTYPE html>
<!-- HTML -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        /* CSS */
        body {
            background-color: rgb(120, 120, 255);
            color: white;
            font: normal 20pt calibri;
        }        
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição!</p> 
    <script>
        // JavaScript
        
        // var n1 = window.prompt('Digite um número: ') // String
        // var n1 = Number.parseInt(window.prompt('Digite um número: ')) // Number
        var n1 = Number(window.prompt('Digite um número: ')) // Simplificado
        
        // var n2 = window.prompt('Digite outro número: ') // String
        // var n2 = parseInt(window.prompt('Digite outro número: ')) // Number
        var n2 = Number(window.prompt('Digite um número: ')) // Simplificado
        
        var s = n1 + n2 // converter string em número 
        // window.alert('A soma dos varos é: ' + s)
        window.alert(`A soma entre ${n1} e ${n2} é igual a ${s}`)
        // window.alert('A soma dos varos é: ' + String(s)) // String
    </script> 
</body>
</html>
