<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt Arial;
            background: green;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            
            transition: all 0.5s;
        }
    </style>
</head>
<body>
    <div id="area"> <!-- onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()" -->
        Clique aqui!
    </div>
    <script>
            var a = document.getElementById('area')
            var textoOriginal = a.innerText
            a.addEventListener('click', clicar)
            a.addEventListener('mouseenter', entrar)
            a.addEventListener('mouseout', sair)

            function clicar() {                
                a.innerText = 'Clicou!'
                a.style.background = 'cornflowerblue'
            }
            function entrar() {
                a.style.width = '250px'  // Aumenta a largura
                a.style.height = '250px' // Aumenta a altura
                a.style.lineHeight = '250px' // Mantém o texto centralizado verticalmente
                a.innerText = 'Olá, mundo!'
                a.style.background = 'yellow'
            }
            function sair() {            
                a.style.width = '200px'  // Volta ao tamanho original
                a.style.height = '200px' // Volta ao tamanho original
                a.style.lineHeight = '200px' // Volta o texto para o centro original
                a.style.background = 'orange' // Garante que a cor volte ao normal se tiver mudado
                a.innerText = 'Tchau!'

                setTimeout(function() {
                    a.innerText = textoOriginal
                    a.style.background = 'green'
                }, 2000)
            }
    </script>
</body>
</html>
