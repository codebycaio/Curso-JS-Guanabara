<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boletim</title>
    <style>
        body {
            background-color: rgb(71, 0, 0);
            color: whitesmoke;
        }
    </style>
</head>
<body>
    <script>
        var n1 = Number(window.prompt('Qual foi sua primeira nota? '))
        var n2 = Number(window.prompt('E qual foi a segunda nota? '))
        var m = (n1 + n2) / 2
        Number(window.alert(`Sua média é: ${m}`))
        var res = m >= 7 ? 'APROVADO' : 'REPROVADO'
        document.write(`VOCÊ ESTÁ ${res}!`)
    </script>
</body>
</html>
